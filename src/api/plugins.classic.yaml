# Classic flavor — spaCy NER + regex-only, CPU-only.
# Geen GLiNER, geen transformer-engine, geen LLM.
# Doelgroep: sidecar / Nextcloud-app / on-prem appliance.
# Zie docs/architecture/flavors.md.

language: nl

ner:
  type: spacy
  # Default = lg voor lokale dev (CLAUDE.md regel). Containers zetten
  # DEFAULT_SPACY_MODEL=nl_core_news_md in de image-env (alleen md is
  # gebakken). Override mogelijk via env-var voor alternatieve setups.
  model: ${DEFAULT_SPACY_MODEL:-nl_core_news_lg}
  entities: [DATE, FAC, GPE, LOC, MONEY, NORP, ORG, PERSON]
  ner_strength: 0.85
  enabled: true

context_aware_enhancer:
  enabled: false
  context_similarity_factor: 0.35
  min_score_with_context_similarity: 0.4

recognizers:
  - name: DutchPhoneNumberRecognizer
    type: pattern
    enabled: true

  - name: DutchIBANRecognizer
    type: pattern
    enabled: true

  - name: DutchBSNRecognizer
    type: pattern
    enabled: true

  - name: DutchDateRecognizer
    type: pattern
    enabled: true

  - name: EmailRecognizer
    type: pattern
    enabled: true

  - name: DutchPassportIdRecognizer
    type: pattern
    enabled: true

  - name: DutchDriversLicenseRecognizer
    type: pattern
    enabled: true

  - name: DutchVATRecognizer
    type: pattern
    enabled: true

  - name: DutchKvKRecognizer
    type: pattern
    enabled: true

  - name: DutchLicensePlateRecognizer
    type: pattern
    enabled: true

  - name: IPv4Recognizer
    type: pattern
    enabled: true

  - name: CaseNumberRecognizer
    type: pattern
    enabled: true

  - name: MACAddressRecognizer
    type: pattern
    enabled: true
