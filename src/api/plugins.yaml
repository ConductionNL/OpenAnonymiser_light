# OpenAnonymiser plugin configuratie.
# Voeg nieuwe recognizers toe zonder Python-code te schrijven.
# Zet enabled: false om een module tijdelijk uit te schakelen.
#
# Ondersteunde typen:
#   pattern     — bestaande PatternRecognizer subclasses uit src/api/utils/patterns.py
#   spacy       — SpaCy NER (NER-engine; altijd precies één entry)
#   transformer — HuggingFace transformers NER (vereist: pip install transformers torch)
#   llm         — LLM-gebaseerde extractie (vereist: pip install openai / anthropic)

language: nl

ner:
  type: spacy
  model: ${DEFAULT_SPACY_MODEL:-nl_core_news_lg}
  entities: [LOCATION, MONEY, NORP, ORGANIZATION, PERSON] 
  ner_strength: 0.85
  enabled: true

# Context-aware enhancement: boosts confidence scores using surrounding words
# Useful for weak regex patterns (ZIP codes, BSN, phone numbers, etc)
# Only works if LemmaContextAwareEnhancer is properly configured
context_aware_enhancer:
  enabled: false  # Set to true to enable context enhancement
  context_similarity_factor: 0.35  # How much context words boost the score
  min_score_with_context_similarity: 0.4  # Minimum score after context boost

recognizers:
  - name: DutchPhoneNumberRecognizer
    type: pattern
    enabled: true

  - name: DutchIBANRecognizer
    type: pattern
    enabled: true

  - name: DutchBSNRecognizer
    type: pattern
    enabled: true

  - name: DutchDateRecognizer
    type: pattern
    enabled: true

  - name: EmailRecognizer
    type: pattern
    enabled: true

  - name: DutchPassportIdRecognizer
    type: pattern
    enabled: true

  - name: DutchDriversLicenseRecognizer
    type: pattern
    enabled: true

  - name: DutchVATRecognizer
    type: pattern
    enabled: true

  - name: DutchKvKRecognizer
    type: pattern
    enabled: true

  - name: DutchLicensePlateRecognizer
    type: pattern
    enabled: true

  - name: IPv4Recognizer
    type: pattern
    enabled: true

  - name: CaseNumberRecognizer
    type: pattern
    enabled: true

  - name: MACAddressRecognizer
    type: pattern
    enabled: true

  - name: DutchPostcodeRecognizer
    type: pattern
    enabled: true

  - name: GLiNERRecognizer
    type: gliner
    enabled: false
    model: "urchade/gliner_multi_pii-v1"
    entity_mapping:
      # CONTEXTUELE PII — alleen entiteiten die patterns niet kunnen detecteren
      persoon: PERSON
      naam: PERSON
      locatie: LOCATION
      woonplaats: LOCATION
      gpe: LOCATION
      gemeente: LOCATION
      stad: LOCATION
      wijk: LOCATION
      buurt: LOCATION
      datum: DATE
      date: DATE
      straatnaam: STREET_ADDRESS
      adres: STREET_ADDRESS
      nationaliteit: NORP
      religie: NORP
      politieke_groep: NORP
      politieke_partij: POLITICAL_PARTY
      organisatie: ORGANIZATION
      werkgever: ORGANIZATION
      bedrijf: ORGANIZATION
      inkomen: MONEY
      salaris: MONEY
      opleidingsniveau: EDUCATION_LEVEL
      opleiding: EDUCATION_LEVEL
    flat_ner: false # true = no nested entities
    multi_label: true
    threshold: 0.45
    map_location: "cpu"
    supported_language: "nl"

  # Optionele modules — standaard uitgeschakeld.
  # Schakel in door enabled: true te zetten en de vereiste packages te installeren.

