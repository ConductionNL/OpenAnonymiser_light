apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openanonymiser-acc

resources:
  - ../../base

namePrefix: acc-

images:
  - name: docker.io/conductiondeploy/openanonymiser-light
    newTag: acc

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
    target:
      kind: Deployment
      name: openanonymiser
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: api.acc.openanonymiser.commonground.nu
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.acc.openanonymiser.commonground.nu
      - op: replace
        path: /spec/tls/0/secretName
        value: openanonymiser-acc-tls
    target:
      kind: Ingress
      name: openanonymiser

configMapGenerator:
  - name: openanonymiser-config
    envs:
      - config.env

labels:
  - pairs:
      environment: acc
