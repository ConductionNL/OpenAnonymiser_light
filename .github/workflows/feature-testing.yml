name: Feature Branch Testing

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        # --extra gpu is nodig zolang we ook de gpu-flavor willen kunnen
        # smoke-testen. Voor classic-only zou --all-groups voldoen.
        run: uv sync --all-groups --extra gpu

      - name: Start API for testing
        # Draait tegen de classic plugin-config zodat alle pattern-recognizers
        # (BSN, IBAN, e-mail, etc.) actief zijn — anders skipt pytest 29 tests
        # met "entity type wordt niet ondersteund". Default plugins.yaml is
        # legacy "incomplete gpu" state met regex disabled.
        run: |
          PLUGINS_CONFIG=src/api/plugins.classic.yaml uv run api.py &
          echo "API_PID=$!" >> $GITHUB_ENV
          
          # Wait for API to be ready (with healthcheck loop, max 60 seconds)
          for i in {1..60}; do
            if curl -s http://localhost:8080/api/v1/health | grep -q pong; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/60)"
            sleep 1
          done
          echo "API failed to start within 60 seconds"
          exit 1

      - name: Run test suite
        run: uv run pytest tests/ -q

      - name: Stop API
        if: always()
        run: kill $API_PID || true
