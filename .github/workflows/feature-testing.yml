name: Feature Branch Testing

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Start API for testing
        run: |
          uv run api.py &
          echo "API_PID=$!" >> $GITHUB_ENV
          sleep 15  # wait for SpaCy model load + pre-warm

      - name: Run test suite
        run: pytest tests/ -q

      - name: Stop API
        if: always()
        run: kill $API_PID || true
