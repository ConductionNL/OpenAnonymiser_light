name: PII Detection Benchmark

on:
  push:
    branches: [ main, staging ]
  workflow_dispatch:

jobs:
  benchmark:
    name: Evaluate PII detection quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Start API
        run: |
          uv run api.py &
          echo "API_PID=$!" >> $GITHUB_ENV
          
          # Wait for API to be ready (with healthcheck loop, max 60 seconds)
          for i in {1..60}; do
            if curl -s http://localhost:8080/api/v1/health | grep -q pong; then
              echo "API is ready"
              exit 0
            fi
            if [ $((i % 10)) -eq 0 ]; then
              echo "Waiting for API... ($i/60)"
            fi
            sleep 1
          done
          echo "API failed to start within 60 seconds"
          exit 1

      - name: Run benchmark
        run: uv run benchmarks/evaluate.py --fail-on-threshold

      - name: Stop API
        if: always()
        run: kill $API_PID || true
