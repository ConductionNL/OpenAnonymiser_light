name: Build and Push Docker Images

on:
  push:
    branches: [ main, staging, development ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build (e.g. main, staging, v1.2.0)'
        required: true
        default: 'staging'

env:
  REGISTRY: docker.io
  IMAGE_NAME: mwest2020/openanonymiser-light

jobs:
  test:
    name: Unit tests (required before build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Download SpaCy model
        run: uv pip install "nl_core_news_md @ https://github.com/explosion/spacy-models/releases/download/nl_core_news_md-3.8.0/nl_core_news_md-3.8.0-py3-none-any.whl"

      - name: Start API
        run: |
          DEFAULT_SPACY_MODEL=nl_core_news_md uv run api.py &
          echo "API_PID=$!" >> $GITHUB_ENV
          sleep 20

      - name: Run tests
        run: uv run pytest tests/ -q

      - name: Stop API
        if: always()
        run: kill $API_PID || true

  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Determine version and tags
        id: meta
        run: |
          REF="${{ github.event.inputs.ref }}"
          if [[ -z "$REF" ]]; then
            REF="${GITHUB_REF#refs/heads/}"
          fi
          echo "Using REF=$REF"

          if [[ "$REF" == "main" ]]; then
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.3.0")
            TAGS="${{ env.IMAGE_NAME }}:${VERSION},${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:main"
          elif [[ "$REF" == "staging" ]]; then
            VERSION="acc"
            TAGS="${{ env.IMAGE_NAME }}:acc"
          elif [[ "$REF" == "development" ]]; then
            VERSION="dev"
            TAGS="${{ env.IMAGE_NAME }}:dev"
          elif [[ "$REF" == v* ]]; then
            VERSION="$REF"
            TAGS="${{ env.IMAGE_NAME }}:${VERSION}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
            TAGS="${{ env.IMAGE_NAME }}:dev"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "📦 Building version: ${VERSION}" >> $GITHUB_STEP_SUMMARY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image pushed summary
        if: github.event_name != 'pull_request'
        run: |
          echo "🚀 **Docker images pushed to Docker Hub:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.meta.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            echo "- \`${tag}\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Version:** \`${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
