name: Build and Push Docker Images

on:
  push:
    branches: [ main, staging, development ]
  pull_request:
    # Build (zonder push) op PR's tegen alle release-branches, zodat
    # Dockerfile-/dep-wijzigingen vóór merge worden gevalideerd.
    # Push step respecteert al `github.event_name != 'pull_request'`.
    branches: [ main, development, staging ]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build (e.g. main, staging, v1.2.0)'
        required: true
        default: 'staging'

env:
  REGISTRY: docker.io
  IMAGE_NAME: mwest2020/openanonymiser-light

jobs:
  test:
    name: Unit tests (required before build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        # --extra gpu is nodig zolang de default plugins.yaml GLiNER op
        # enabled heeft staan. Test-job draait tegen plugins.yaml (default),
        # niet tegen plugins.classic.yaml of plugins.gpu.yaml.
        run: uv sync --group dev --extra gpu

      - name: Start API
        run: |
          DEFAULT_SPACY_MODEL=nl_core_news_lg uv run api.py &
          echo "API_PID=$!" >> $GITHUB_ENV

          # Wait for API to be ready (with healthcheck loop, max 60 seconds)
          for i in {1..60}; do
            if curl -s http://localhost:8080/api/v1/health | grep -q pong; then
              echo "API is ready"
              exit 0
            fi
            if [ $((i % 10)) -eq 0 ]; then
              echo "Waiting for API... ($i/60)"
            fi
            sleep 1
          done
          echo "API failed to start within 60 seconds"
          exit 1

      - name: Run tests
        run: uv run pytest tests/ -q

      - name: Stop API
        if: always()
        run: kill $API_PID || true

  build:
    name: Build and push ${{ matrix.flavor }} image
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        flavor: [classic, gpu]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Determine version and tags
        id: meta
        run: |
          REF="${{ github.event.inputs.ref }}"
          if [[ -z "$REF" ]]; then
            REF="${GITHUB_REF#refs/heads/}"
          fi
          FLAVOR="${{ matrix.flavor }}"
          echo "Using REF=$REF FLAVOR=$FLAVOR"

          # Tag-strategie:
          # - elke flavor krijgt :{tier}-{flavor} (bv. dev-classic, acc-gpu)
          # - default-alias per tier zonder suffix:
          #     main      → :latest = classic   (classic = default per design.md)
          #     staging   → :acc    = classic   (alleen classic gaat staging in)
          #     develop.  → :dev    = gpu       (huidig cluster-gedrag bewaren)
          if [[ "$REF" == "main" ]]; then
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.3.0")
            TAGS="${{ env.IMAGE_NAME }}:${FLAVOR}-${VERSION},${{ env.IMAGE_NAME }}:${FLAVOR}-latest,${{ env.IMAGE_NAME }}:${FLAVOR}-main"
            if [[ "$FLAVOR" == "classic" ]]; then
              TAGS="${TAGS},${{ env.IMAGE_NAME }}:latest"
            fi
          elif [[ "$REF" == "staging" ]]; then
            VERSION="acc-${FLAVOR}"
            TAGS="${{ env.IMAGE_NAME }}:acc-${FLAVOR}"
            if [[ "$FLAVOR" == "classic" ]]; then
              TAGS="${TAGS},${{ env.IMAGE_NAME }}:acc"
            fi
          elif [[ "$REF" == "development" ]]; then
            VERSION="dev-${FLAVOR}"
            TAGS="${{ env.IMAGE_NAME }}:dev-${FLAVOR}"
            if [[ "$FLAVOR" == "gpu" ]]; then
              TAGS="${TAGS},${{ env.IMAGE_NAME }}:dev"
            fi
          elif [[ "$REF" == v* ]]; then
            VERSION="${REF}-${FLAVOR}"
            TAGS="${{ env.IMAGE_NAME }}:${REF}-${FLAVOR}"
          else
            VERSION="dev-${FLAVOR}-${GITHUB_SHA::7}"
            TAGS="${{ env.IMAGE_NAME }}:dev-${FLAVOR}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "📦 Building flavor=${FLAVOR} version=${VERSION}" >> $GITHUB_STEP_SUMMARY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.flavor }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.flavor }}
          cache-to: type=gha,mode=max,scope=${{ matrix.flavor }}

      - name: Image pushed summary
        if: github.event_name != 'pull_request'
        run: |
          echo "🚀 **Docker images pushed to Docker Hub (${{ matrix.flavor }}):**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.meta.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            echo "- \`${tag}\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Version:** \`${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
